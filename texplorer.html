<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOFF Data Explorer</title>
<style>
  body { margin:0; background:#1a1a2e; color:#eee; font:14px monospace; display:flex; }
  #panel { width:320px; padding:16px; background:#16213e; overflow-y:auto; height:100vh; box-sizing:border-box; }
  #panel label { display:block; margin-top:10px; font-size:12px; color:#aab; }
  #panel input, #panel select { width:100%; padding:6px; margin-top:2px; background:#0f3460; color:#eee; border:1px solid #533483; border-radius:4px; font:13px monospace; }
  #panel input[type=range] { padding:0; }
  #panel button { width:100%; margin-top:12px; padding:8px; background:#533483; color:#fff; border:none; border-radius:4px; cursor:pointer; font:13px monospace; }
  #panel button:hover { background:#6b42b4; }
  #panel .info { font-size:11px; color:#889; margin-top:4px; }
  #view { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #view canvas { border:1px solid #333; cursor:grab; }
  #view canvas:active { cursor:grabbing; }
</style>
</head>
<body>

<div id="panel">
  <h2>VOFF Data Explorer</h2>
  <p class="info">Drop an MT, BSEL, TEXB, or SCRADD file.</p>

  <input type="file" id="fileInput" accept=".IMG,.BIN,.img,.bin">

  <label>View mode</label>
  <select id="viewMode">
    <option value="auto">Auto-detect</option>
    <option value="tex">Texture (TEXB/8-bit)</option>
    <option value="voff4">Texture (VOFF 4-bit)</option>
    <option value="scradd">SCRADD Heightmap</option>
    <option value="mt">MT 3D Model</option>
  </select>

  <label>MT: Vertex stride</label>
  <input type="number" id="mtStride" value="20" min="12" max="64">

  <label>MT: Triangle limit</label>
  <input type="number" id="mtTriLimit" value="5000" min="100" max="50000">

  <label>SCRADD: Grid width</label>
  <input type="number" id="gridW" value="128" min="16" max="512">

  <label>SCRADD: Grid height</label>
  <input type="number" id="gridH" value="64" min="16" max="512">

  <label>SCRADD: Height scale</label>
  <input type="range" id="heightScale" min="1" max="100" value="20">

  <button id="btnRefresh">Refresh</button>

  <hr>
  <p class="info" id="status">Drop a file to begin.</p>
  <p class="info" id="fileInfo"></p>
  <p class="info" id="stats"></p>
</div>

<div id="view">
  <canvas id="mainCanvas" width="800" height="600"></canvas>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const fileInfoEl = document.getElementById('fileInfo');
const statsEl = document.getElementById('stats');

let fileData = null;
let fileName = '';

// 3D view state
let viewRotX = -0.5, viewRotY = 0.3, viewZoom = 1.0;
let dragging = false, dragX = 0, dragY = 0;

fileInput.addEventListener('change', handleFile);
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if(f) { fileInput.files = e.dataTransfer.files; handleFile(); } });
document.getElementById('btnRefresh').addEventListener('click', render);
document.getElementById('viewMode').addEventListener('change', render);

// Mouse rotation
canvas.addEventListener('mousedown', e => { dragging = true; dragX = e.clientX; dragY = e.clientY; });
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  viewRotY += (e.clientX - dragX) * 0.005;
  viewRotX -= (e.clientY - dragY) * 0.005;
  dragX = e.clientX; dragY = e.clientY;
  render();
});
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('wheel', e => { e.preventDefault(); viewZoom *= e.deltaY > 0 ? 0.9 : 1.1; render(); });

function handleFile() {
  const file = fileInput.files[0];
  if (!file) return;
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = () => {
    fileData = new Uint8Array(reader.result);
    fileInfoEl.textContent = `${fileName}: ${fileData.length.toLocaleString()} bytes`;
    
    // Auto-detect mode
    const mode = document.getElementById('viewMode').value;
    if (mode === 'auto') {
      const name = fileName.toLowerCase();
      if (name.includes('scradd')) document.getElementById('viewMode').value = 'scradd';
      else if (name.startsWith('mt_') || name.includes('_mt_')) document.getElementById('viewMode').value = 'mt';
      else if (name.startsWith('texb')) document.getElementById('viewMode').value = 'voff4';
      else document.getElementById('viewMode').value = 'tex';
    }
    
    render();
  };
  reader.readAsArrayBuffer(file);
}

function project(x, y, z) {
  // Simple isometric-ish rotation
  const cosY = Math.cos(viewRotY), sinY = Math.sin(viewRotY);
  const cosX = Math.cos(viewRotX), sinX = Math.sin(viewRotX);
  
  let rx = x * cosY - z * sinY;
  let rz = x * sinY + z * cosY;
  let ry = y * cosX - rz * sinX;
  let rz2 = y * sinX + rz * cosX;
  
  const scale = viewZoom * 0.5;
  return {
    sx: canvas.width/2 + rx * scale,
    sy: canvas.height/2 - ry * scale + rz2 * scale * 0.3,
  };
}

function drawWireframeGrid(heights, gridW, gridH, hScale) {
  const minH = Math.min(...heights);
  const maxH = Math.max(...heights);
  const range = maxH - minH || 1;
  const cellW = 800 / gridW;
  const cellH = cellW;
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw wireframe mesh
  ctx.strokeStyle = '#0f0';
  ctx.lineWidth = 0.5;
  
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      const idx = y * gridW + x;
      if (idx >= heights.length) break;
      const h = (heights[idx] - minH) / range;
      const px = (x - gridW/2) * cellW;
      const py = (y - gridH/2) * cellH;
      const pz = h * hScale * 5;
      
      const p = project(px, pz, py);
      
      // Connect to right neighbor
      if (x < gridW - 1) {
        const idx2 = y * gridW + x + 1;
        const h2 = (heights[idx2] - minH) / range;
        const p2 = project((x+1 - gridW/2) * cellW, h2 * hScale * 5, py);
        ctx.beginPath();
        ctx.moveTo(p.sx, p.sy);
        ctx.lineTo(p2.sx, p2.sy);
        ctx.stroke();
      }
      
      // Connect to bottom neighbor
      if (y < gridH - 1) {
        const idx2 = (y+1) * gridW + x;
        if (idx2 < heights.length) {
          const h2 = (heights[idx2] - minH) / range;
          const p2 = project(px, h2 * hScale * 5, (y+1 - gridH/2) * cellH);
          ctx.beginPath();
          ctx.moveTo(p.sx, p.sy);
          ctx.lineTo(p2.sx, p2.sy);
          ctx.stroke();
        }
      }
    }
  }
  
  statsEl.textContent = `Grid: ${gridW}x${gridH} | H range: ${minH}-${maxH} | Scale: ${hScale}`;
}

function parseMTWireframe(data, stride, triLimit) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  const view = new DataView(data.buffer);
  const VERTEX_STRIDE = stride;
  const HEADER_SIZE = 8;
  
  const strips = [];
  let currentStrip = [];
  let layout = 'A';  // First strip uses Type A, then switches to Type B
  let stripColors = ['#0f0', '#0ff', '#f0f', '#ff0', '#f80', '#0ff', '#f00', '#00f'];
  let colorIdx = 0;
  
  for (let vi = 0; vi < Math.floor((data.length - HEADER_SIZE) / VERTEX_STRIDE); vi++) {
    const pos = HEADER_SIZE + vi * VERTEX_STRIDE;
    if (pos + VERTEX_STRIDE > data.length) break;
    
    const word0 = view.getUint32(pos, true);
    const exponent = (word0 >> 23) & 0xFF;
    const mantissa = word0 & 0x007FFFFF;
    const isNaN = exponent === 0xFF && mantissa !== 0;
    
    if (isNaN) {
      // Strip boundary — finish current, start new
      if (currentStrip.length >= 3) {
        strips.push({ verts: currentStrip, color: stripColors[colorIdx % stripColors.length] });
        colorIdx++;
      }
      currentStrip = [];
      layout = 'B';  // All strips after the first use Type B layout
      
      // Strip header vertex uses Type B position (bytes 8-19)
      currentStrip.push({
        x: view.getFloat32(pos + 8, true),
        y: view.getFloat32(pos + 12, true),
        z: view.getFloat32(pos + 16, true)
      });
    } else {
      // Use current layout
      if (layout === 'A') {
        currentStrip.push({
          x: view.getFloat32(pos, true),
          y: view.getFloat32(pos + 4, true),
          z: view.getFloat32(pos + 8, true)
        });
      } else {
        currentStrip.push({
          x: view.getFloat32(pos + 8, true),
          y: view.getFloat32(pos + 12, true),
          z: view.getFloat32(pos + 16, true)
        });
      }
    }
    
    if (strips.length > 50) break; // limit strips for performance
  }
  
  // Final strip
  if (currentStrip.length >= 3) {
    strips.push({ verts: currentStrip, type: currentType, color: stripColors[colorIdx % stripColors.length] });
  }
  
  // Find bounding box (exclude garbage attribute values)
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (const s of strips) {
    for (const v of s.verts) {
      if (Math.abs(v.x) < 10000 && Math.abs(v.y) < 10000 && Math.abs(v.z) < 10000) {
        minX = Math.min(minX, v.x); maxX = Math.max(maxX, v.x);
        minY = Math.min(minY, v.y); maxY = Math.max(maxY, v.y);
        minZ = Math.min(minZ, v.z); maxZ = Math.max(maxZ, v.z);
      }
    }
  }
  
  const range = Math.max(maxX - minX, maxY - minY, maxZ - minZ, 0.001);
  const scale = 400 / range;
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const cz = (minZ + maxZ) / 2;
  
  let totalTris = 0;
  let firstVerts = [];
  let vertsTotal = 0;
  for (const s of strips) {
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 0.5;
    const v = s.verts;
    vertsTotal += v.length;
    
    // Capture first 3 projected screen positions for diagnostics
    if (firstVerts.length < 3 && v.length > 0) {
      const p = project((v[0].x - cx) * scale, (v[0].y - cy) * scale, (v[0].z - cz) * scale);
      firstVerts.push({sx: p.sx.toFixed(0), sy: p.sy.toFixed(0), cx: (v[0].x - cx).toFixed(2), cy: (v[0].y - cy).toFixed(2), cz: (v[0].z - cz).toFixed(2)});
    }
    
    for (let i = 0; i < v.length - 2; i++) {
      const a = project((v[i].x - cx) * scale, (v[i].y - cy) * scale, (v[i].z - cz) * scale);
      const b = project((v[i+1].x - cx) * scale, (v[i+1].y - cy) * scale, (v[i+1].z - cz) * scale);
      const c = project((v[i+2].x - cx) * scale, (v[i+2].y - cy) * scale, (v[i+2].z - cz) * scale);
      
      if (Math.abs(a.sx) < 10000 && Math.abs(a.sy) < 10000) {
        ctx.beginPath();
        ctx.moveTo(a.sx, a.sy);
        ctx.lineTo(b.sx, b.sy);
        ctx.lineTo(c.sx, c.sy);
        ctx.closePath();
        ctx.stroke();
        totalTris++;
      }
    }
  }
  
  const diag = firstVerts.map(p => `(${p.sx},${p.sy})`).join(' ');
  statsEl.textContent = `MT | ${strips.length} strips | ${vertsTotal}v | ~${totalTris} tris | Range: ${range.toFixed(2)} | Screen: ${diag}`;
}

function render() {
  if (!fileData) return;
  
  const mode = document.getElementById('viewMode').value;
  const view = new DataView(fileData.buffer);
  
  if (mode === 'scradd' || (mode === 'auto' && fileName.toLowerCase().includes('scradd'))) {
    const gridW = parseInt(document.getElementById('gridW').value);
    const gridH = parseInt(document.getElementById('gridH').value);
    const hScale = parseInt(document.getElementById('heightScale').value);
    
    const heights = [];
    for (let i = 0; i < Math.min(fileData.length / 2, gridW * gridH); i++) {
      heights.push(view.getInt16(i * 2, true));
    }
    
    drawWireframeGrid(heights, gridW, gridH, hScale);
    statusEl.textContent = `SCRADD height map: ${gridW}x${gridH}, ${heights.length} heights`;
  }
  else if (mode === 'mt' || (mode === 'auto' && fileName.toLowerCase().includes('mt_'))) {
    const stride = parseInt(document.getElementById('mtStride').value);
    const triLimit = parseInt(document.getElementById('mtTriLimit').value);
    parseMTWireframe(fileData, stride, triLimit);
    statusEl.textContent = `MT model: stride=${stride}, limit=${triLimit} tris`;
  }
  else if (mode === 'voff4') {
    // Deinterleave + nibble split (existing code from texplorer)
    renderVoff4(fileData);
  }
  else {
    // Texture mode (existing code)
    renderTexture(fileData);
  }
}

function renderVoff4(data) {
  const size = 1024 * 1024;
  const deint = new Uint8Array(size);
  
  for (let row = 0; row < 1024; row++) {
    for (let col = 0; col < 1024; col += 2) {
      const src = row * 1024 + col;
      deint[row * 1024 + col/2] = data[src + 1];
      deint[(2*row + 1) * 512 + col/2] = data[src];
    }
  }
  
  canvas.width = 1024;
  canvas.height = 1024;
  canvas.style.width = '512px';
  canvas.style.height = '512px';
  
  const img = ctx.createImageData(1024, 1024);
  for (let i = 0; i < size; i++) {
    const b = deint[i];
    img.data[i*4] = b; img.data[i*4+1] = b; img.data[i*4+2] = b; img.data[i*4+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  statusEl.textContent = `VOFF 4-bit: 1024x1024 deinterleaved`;
}

function renderTexture(data) {
  const w = 256, h = 256;
  const texSize = w * h;
  canvas.width = w * 4;
  canvas.height = h * 4;
  canvas.style.width = (w * 4) + 'px';
  canvas.style.height = (h * 4) + 'px';
  
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for (let t = 0; t < 16; t++) {
    const off = t * texSize;
    if (off + texSize > data.length) break;
    
    const tx = (t % 4) * w;
    const ty = Math.floor(t / 4) * h;
    const img = ctx.createImageData(w, h);
    
    for (let i = 0; i < texSize; i++) {
      const b = data[off + i];
      img.data[i*4] = b; img.data[i*4+1] = b; img.data[i*4+2] = b; img.data[i*4+3] = 255;
    }
    ctx.putImageData(img, tx, ty);
  }
  statusEl.textContent = `Texture: 16 textures at 256x256`;
}
</script>
</body>
</html>
